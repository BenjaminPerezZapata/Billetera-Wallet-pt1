<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Enviar Dinero</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>

    <header>
        <h1>Wallet CLP</h1>
        <nav>
            <a href="transferir.html">Transferir</a>
            <a href="destinatarios.html">Destinatarios</a>
            <a href="recargar.html">Recargar</a>
            <a href="perfil.html">Perfil</a>
            <a href="mistransferencias.html">Mis Transferencias</a>
        </nav>
    </header>

    <main class="container">
        <h2>Enviar Dinero a Contactos</h2>
        <hr>

        <ul class="list-group mb-4">
            <li class="list-group-item">
                <div class="contact-info"><strong>Ana Martínez</strong> - Banco Estado</div>
                <button class="btn btn-sm btn-primary mt-2 btn-enviar">Seleccionar</button>
            </li>
            <li class="list-group-item">
                <div class="contact-info"><strong>Pedro Sánchez</strong> - Banco de Chile</div>
                <button class="btn btn-sm btn-primary mt-2 btn-enviar">Seleccionar</button>
            </li>
            <li class="list-group-item">
                <div class="contact-info"><strong>Lucía Fernández</strong> - Banco Santander</div>
                <button class="btn btn-sm btn-primary mt-2 btn-enviar">Seleccionar</button>
            </li>
        </ul>

        <p><a href="menu.html" class="btn btn-secondary">Volver al Menú</a></p>
    </main>

    <footer>
        <p>Wallet CLP - Todos los derechos reservados 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $('.btn-enviar').click(function() {
            var nombreContacto = $(this).siblings('.contact-info').find('strong').text();
            var saldoActual = Number(localStorage.getItem('walletSaldo')) || 0;
            var movimientos = JSON.parse(localStorage.getItem('walletMovimientos')) || [];
            var montoTexto = prompt("¿Cuánto dinero deseas enviar a " + nombreContacto + "?");
            

            if (montoTexto === null) {
                return;
            }

            var montoAEnviar = Number(montoTexto);

            if (isNaN(montoAEnviar) || montoAEnviar <= 0) {
                alert('Monto inválido.');
                return; 
            }

            if (montoAEnviar > saldoActual) {
                alert('Saldo insuficiente. Tienes: $' + saldoActual);
                return; 
            }


            saldoActual = saldoActual - montoAEnviar;
            localStorage.setItem('walletSaldo', saldoActual);
            

            var fechaActual = new Date().toLocaleDateString('es-CL');
            movimientos.push({
                tipo: 'Transferencia a ' + nombreContacto,
                monto: montoAEnviar,
                fecha: fechaActual,
                esIngreso: false 
            });
            localStorage.setItem('walletMovimientos', JSON.stringify(movimientos));
            
            alert('Transferencia exitosa.');
            window.location.href = "menu.html";
        });
    </script>
</body>
</html>
