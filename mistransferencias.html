<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Movimientos</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>

    <header>
        <h1>Wallet CLP</h1>
        <nav>
            <a href="transferir.html">Transferir</a>
            <a href="destinatarios.html">Destinatarios</a>
            <a href="recargar.html">Recargar</a>
            <a href="perfil.html">Perfil</a>
            <a href="mistransferencias.html">Mis Transferencias</a>
        </nav>
    </header>

    <main class="container">
        <h2>Últimos Movimientos</h2>
        <p class="text-muted">Historial de tus transacciones</p>
        <hr>

        <ul id="listaMovimientos" class="list-group mb-4">
            </ul>

        <p><a href="menu.html" class="btn btn-secondary">Volver al Menú</a></p>
    </main>

    <footer>
        <p>Wallet CLP - Todos los derechos reservados 2026</p>
    </footer>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function() {
            var movimientos = JSON.parse(localStorage.getItem('walletMovimientos')) || [];
            var $lista = $('#listaMovimientos');

            if (movimientos.length === 0) {
                $lista.append('<li class="list-group-item text-center">No tienes movimientos aún.</li>');
            } else {
                movimientos.slice().reverse().forEach(function(mov) {
                    var colorClase = mov.esIngreso ? 'text-success' : 'text-danger';
                    var signo = mov.esIngreso ? '+' : '-';
                    
                    var liHTML = `
                    <li class="list-group-item">
                        <h5>${mov.tipo}</h5>
                        <p class="${colorClase} mb-1">${signo}$${mov.monto}</p>
                        <small>${mov.fecha}</small>
                    </li>`;
                    $lista.append(liHTML);
                });
            }
        });
    </script>
</body>
</html>
