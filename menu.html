<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallet - Menú</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>

<body>
    <header>
        <h1>Wallet CLP</h1>
        <nav>
            <a href="transferir.html">Transferir</a>
            <a href="destinatarios.html">Destinatarios</a>
            <a href="recargar.html">Recargar</a>
            <a href="perfil.html">Perfil</a>
            <a href="mistransferencias.html">Mis Transferencias</a>
        </nav>
    </header>

    <div class="container mt-5 text-center">
        <h2>Menú Principal</h2>
        <hr>
        <h3>Saldo actual: <span id="saldoDisplay" class="text-success">$0</span></h3>
        <br>
        <button type="button" id="btnLogout" class="btn btn-danger">Cerrar Sesión</button>
    </div>
    

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        var saldo = Number(localStorage.getItem('walletSaldo')) || 0;
        $('#saldoDisplay').text('$' + saldo);

        $('#btnLogout').click(function() {
            localStorage.clear();
            window.location.href = "login.html";
        });
    </script>
</body>
</html>
